spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/deposition
    username: deposition
    password: deposition
  liquibase:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8085/realms/deposition

server:
  port: 8082

logging:
  level:
    org.opensearch.client: TRACE
    org.apache.http: DEBUG
    org.apache.http.headers: DEBUG
    org.apache.http.wire: TRACE

integration:
  ethereum:
    rpc-url: http://localhost:18545
    from-address: "0x9b790656b9ec0db1936ed84b3bea605873558198"
    gas-limit-integer: 3000000
    chain-id: 1337
    gas-price-wei: 0
  opensearch:
    enabled: true
    endpoint: http://localhost:9200
    descriptive-metadata-index: descriptive-metadata
    object-index: objects
  s3:
    endpoint: http://localhost:9000
    presign-endpoint: http://localhost:9000
    region: us-east-1
    access-key: rustfs-access
    secret-key: rustfs-secret
    bucket-name: deposition-local-bucket
