spring:
  application:
    name: deposition-system
  datasource:
    url: ${spring.datasource.url}
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}
    driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: ${spring.liquibase.enabled}
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}

server:
  port: ${server.port}

integration:
  ethereum:
    rpc-url: ${integration.ethereum.rpc-url}
    gas-limit-integer: ${integration.ethereum.gas-limit-integer}
    chain-id: ${integration.ethereum.chain-id}
    gas-price-wei: ${integration.ethereum.gas-price-wei:0}
  opensearch:
    enabled: ${integration.opensearch.enabled:false}
    endpoint: ${integration.opensearch.endpoint:}
    descriptive-metadata-index: ${integration.opensearch.descriptive-metadata-index:descriptive-metadata}
    object-index: ${integration.opensearch.object-index:objects}
  s3:
    endpoint: ${integration.s3.endpoint}
    region: ${integration.s3.region}
    access-key: ${integration.s3.access-key}
    secret-key: ${integration.s3.secret-key}
    bucket-name: ${integration.s3.bucket-name}

statistics:
  events:
    executor:
      thread-name-prefix: statistics-event-
      daemon: true
      core-pool-size: 1
      maximum-pool-size: 2
      keep-alive: 60s
      allow-core-thread-time-out: false
