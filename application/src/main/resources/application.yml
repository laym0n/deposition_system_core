spring:
  application:
    name: deposition-system
  servlet:
    multipart:
      max-file-size: ${oscm.spring.servlet.multipart.max-file-size:1GB}
      max-request-size: ${oscm.spring.servlet.multipart.max-request-size:1100MB}
      file-size-threshold: ${oscm.spring.servlet.multipart.file-size-threshold:1MB}
      location: ${oscm.spring.servlet.multipart.location:${java.io.tmpdir}}
  datasource:
    url: ${spring.datasource.url}
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}
    driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: ${spring.liquibase.enabled}
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}

server:
  port: ${server.port}
  tomcat:
    max-http-form-post-size: ${oscm.server.tomcat.max-http-form-post-size:-1}
    max-swallow-size: ${oscm.server.tomcat.max-swallow-size:-1}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

integration:
  ethereum:
    rpc-url: ${integration.ethereum.rpc-url}
    gas-limit-integer: ${integration.ethereum.gas-limit-integer}
    chain-id: ${integration.ethereum.chain-id}
    gas-price-wei: ${integration.ethereum.gas-price-wei:0}
    from-address: ${integration.ethereum.from-address}
  opensearch:
    endpoint: ${integration.opensearch.endpoint:}
    descriptive-metadata-index: ${integration.opensearch.descriptive-metadata-index:descriptive-metadata}
    object-index: ${integration.opensearch.object-index:objects}
  s3:
    endpoint: ${integration.s3.endpoint}
    region: ${integration.s3.region}
    access-key: ${integration.s3.access-key}
    secret-key: ${integration.s3.secret-key}
    bucket-name: ${integration.s3.bucket-name}
    presign-endpoint: ${oscm.integration.s3.presign-endpoint}

  keycloak:
    base-url: ${oscm.integration.keycloak.base-url:}
    realm: ${oscm.integration.keycloak.realm:}
    admin-client-id: ${oscm.integration.keycloak.admin-client-id:}
    admin-client-secret: ${oscm.integration.keycloak.admin-client-secret:}

statistics:
  events:
    executor:
      thread-name-prefix: statistics-event-
      daemon: true
      core-pool-size: 1
      maximum-pool-size: 2
      keep-alive: 60s
      allow-core-thread-time-out: false

deposition:
  security:
    rules:
      - method: GET
        path: /intellectual-entity-types
        access: anonymous
      - method: POST
        path: /objects/search
        access: anonymous
  indexing:
    executor:
      thread-name-prefix: deposition-indexing-
      daemon: true
      core-pool-size: 2
      maximum-pool-size: 4
      queue-capacity: 200
      keep-alive: 60s
      allow-core-thread-time-out: false
  job:
    executor:
      thread-name-prefix: deposition-job-
      daemon: true
      core-pool-size: 1
      maximum-pool-size: 2
      keep-alive: 60s
      allow-core-thread-time-out: false
