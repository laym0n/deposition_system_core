databaseChangeLog:
  - changeSet:
      id: 004-create-deposition-job
      author: cline
      changes:
        - createTable:
            tableName: deposition_job
            columns:
              - column:
                  name: job_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: object_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: owner_user_id
                  type: varchar(256)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: request_json
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: idempotency_key
                  type: varchar(256)
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: result_tx_id
                  type: varchar(256)
                  constraints:
                    nullable: true
              - column:
                  name: result_version_id
                  type: varchar(256)
                  constraints:
                    nullable: true
              - column:
                  name: error_message
                  type: text
                  constraints:
                    nullable: true

        - createIndex:
            tableName: deposition_job
            indexName: idx_deposition_job_owner_status
            columns:
              - column:
                  name: owner_user_id
              - column:
                  name: status

        - addUniqueConstraint:
            tableName: deposition_job
            constraintName: uq_deposition_job_owner_idempotency
            columnNames: owner_user_id,idempotency_key

        - createTable:
            tableName: deposition_job_file
            columns:
              - column:
                  name: file_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: job_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: original_name
                  type: varchar(1024)
                  constraints:
                    nullable: false
              - column:
                  name: content_type
                  type: varchar(256)
                  constraints:
                    nullable: true
              - column:
                  name: size_bytes_expected
                  type: bigint
                  constraints:
                    nullable: true
              - column:
                  name: object_key
                  type: varchar(2048)
                  constraints:
                    nullable: false
              - column:
                  name: content_location
                  type: varchar(4096)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: deposition_job_file
            baseColumnNames: job_id
            referencedTableName: deposition_job
            referencedColumnNames: job_id
            constraintName: fk_deposition_job_file_job

        - createIndex:
            tableName: deposition_job_file
            indexName: idx_deposition_job_file_job
            columns:
              - column:
                  name: job_id
