services:

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: deposition-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "StrongPassword123!"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - ./data/opensearch:/usr/share/opensearch/data
    networks:
      - deposition-network
  
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: deposition-opensearch-dashboards
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      - opensearch
    networks:
      - deposition-network

  # postgres:
  #   image: postgres:16-alpine
  #   container_name: deposition-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: deposition
  #     POSTGRES_USER: deposition
  #     POSTGRES_PASSWORD: deposition
  #   ports:
  #     - "5432:5432"
