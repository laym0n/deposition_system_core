version: "3.9"

services:
  besu:
    image: hyperledger/besu:latest
    container_name: besu-private-node
    restart: unless-stopped
    command:
      - --network=dev
      - --data-path=/var/lib/besu
      - --rpc-http-enabled
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-api=ETH,NET,WEB3,TXPOOL,DEBUG
      - --rpc-http-cors-origins=all
      - --host-allowlist=*
      - --rpc-ws-enabled
      - --rpc-ws-host=0.0.0.0
      - --rpc-ws-port=8546
      - --rpc-ws-api=ETH,NET,WEB3,TXPOOL,DEBUG
      - --p2p-host=0.0.0.0
      - --p2p-port=30303
      - --logging=INFO
    ports:
      - "8545:8545"
      - "8546:8546"
      - "30303:30303/tcp"
      - "30303:30303/udp"
    volumes:
      - besu-data:/var/lib/besu

  ceph:
    image: ceph/daemon:latest-octopus
    container_name: ceph-rgw-node
    restart: unless-stopped
    command: demo
    environment:
      MON_IP: 172.28.0.10
      CEPH_PUBLIC_NETWORK: 172.28.0.0/16
      RGW_NAME: client.rgw.gateway
      RGW_CIVETWEB_PORT: 7480
      CEPH_DEMO_UID: local-dev
      CEPH_DEMO_ACCESS_KEY: local-dev-access-key
      CEPH_DEMO_SECRET_KEY: local-dev-secret-key
    ports:
      - "7480:7480"
    volumes:
      - ceph-data:/var/lib/ceph
    networks:
      deposition-network:
        ipv4_address: 172.28.0.10

volumes:
  besu-data:
  ceph-data:

networks:
  deposition-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
