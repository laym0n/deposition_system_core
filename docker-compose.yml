services:

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: deposition-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "StrongPassword123!"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - ./data/opensearch:/usr/share/opensearch/data
    networks:
      - deposition-network

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: deposition-opensearch-dashboards
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      - opensearch
    networks:
      - deposition-network

  # postgres:
  #   image: postgres:16-alpine
  #   container_name: deposition-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: deposition
  #     POSTGRES_USER: deposition
  #     POSTGRES_PASSWORD: deposition
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - ./data/postgres:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U deposition -d deposition"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 20
  #   networks:
  #     - deposition-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: deposition-pgadmin
    restart: unless-stopped
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin
    # Allows connecting from pgAdmin container to services exposed on the host.
    # On Docker Desktop (Windows/macOS) host.docker.internal usually works out-of-the-box,
    # but this mapping also makes it work on many Linux setups.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deposition-network

  rustfs:
    image: rustfs/rustfs:latest
    container_name: deposition-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: rustfs-access
      RUSTFS_SECRET_KEY: rustfs-secret
    ports:
      - "9000:9001"
    volumes:
      - ./data/rustfs:/data
    networks:
      - deposition-network

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak-sso
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin-secret
      KC_DB: dev-file
      KC_HTTP_ENABLED: true
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
    ports:
      - "8085:8080"
    volumes:
      - ./data/keycloak:/opt/keycloak/data
    command: start-dev
    networks:
      - deposition-network

  prometheus:
    image: prom/prometheus:latest
    container_name: deposition-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deposition-network

  grafana:
    image: grafana/grafana:latest
    container_name: deposition-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - deposition-network
# curl -X POST http://localhost:8085/realms/deposition/protocol/openid-connect/token -H "Content-Type: application/x-www-form-urlencoded" -d "client_id=deposition-client" -d "username=testuser" -d "password=testuser" -d "grant_type=password"

networks:
  deposition-network:
    driver: bridge
