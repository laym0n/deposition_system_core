version: "3.9"

services:
  besu:
    image: hyperledger/besu:latest
    container_name: besu-private-node
    restart: unless-stopped
    command:
      - --network=dev
      - --data-path=/var/lib/besu
      - --rpc-http-enabled
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-api=ETH,NET,WEB3,TXPOOL,DEBUG
      - --rpc-http-cors-origins=all
      - --host-allowlist=*
      - --rpc-ws-enabled
      - --rpc-ws-host=0.0.0.0
      - --rpc-ws-port=8546
      - --rpc-ws-api=ETH,NET,WEB3,TXPOOL,DEBUG
      - --p2p-host=0.0.0.0
      - --p2p-port=30303
      - --logging=INFO
    ports:
      - "8545:8545"
      - "8546:8546"
      - "30303:30303/tcp"
      - "30303:30303/udp"
    volumes:
      - besu-data:/var/lib/besu

volumes:
  besu-data:
