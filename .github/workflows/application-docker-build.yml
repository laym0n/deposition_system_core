name: Build application Docker image

on:
  push:
    branches:
      - main
    paths:
      - "application/**"
      - "domain/**"
      - "infra/**"
      - "pom.xml"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/application-docker-build.yml"

jobs:
  docker-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: deposition/application:ci
