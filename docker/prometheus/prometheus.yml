global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: deposition-system
    metrics_path: /actuator/prometheus
    static_configs:
      # If you run the app on host (port 8082 in local-dev profile), Prometheus container can access it via host.docker.internal.
      - targets: ["host.docker.internal:8082"]
